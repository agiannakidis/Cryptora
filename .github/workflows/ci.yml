name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: casino
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: casino_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-at-least-32-characters-long
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: casino
          PG_PASSWORD: testpassword
          PG_DATABASE: casino_db
          MASTER_MNEMONIC: 
        run: npm test
      
      - name: Check syntax
        run: |
          node --check src/index.js
          node --check src/routes/crypto.js
          node --check src/crypto/monitor.js
          node --check src/crypto/withdraw.js
