<script>
// Cryptora error guard
// id=cr-error-guard — filter noise from injection scripts
(function(){
  var origError = console.error.bind(console);
  var origWarn = console.warn.bind(console);
  var NOISE = [
    'ResizeObserver loop',
    'Non-passive event listener',
    'Could not load',
    'Unrecognized feature',
    'Extension context',
    'blocked by CORS',
  ];
  function isNoise(args) {
    var s = Array.prototype.join.call(args,' ');
    for(var i=0;i<NOISE.length;i++){ if(s.indexOf(NOISE[i])!==-1) return true; }
    return false;
  }
  console.error = function(){ if(!isNoise(arguments)) origError.apply(console,arguments); };
  console.warn  = function(){ if(!isNoise(arguments)) origWarn.apply(console,arguments); };
})();
</script>

  <script>
    // Prefetch /api/auth/me and intercept React fetch to serve from cache
    (function(){
      try {
        var t = localStorage.getItem('auth_token');
        if (!t) return;

        // Start prefetch immediately (before React bundle loads)
        var prefetchPromise = fetch('/api/auth/me', {
          headers: { Authorization: 'Bearer ' + t }
        }).then(function(r){ return r.clone().json().then(function(d){ return {data:d, status:r.status}; }); })
          .catch(function(){ return null; });

        // Intercept fetch — when React calls /api/auth/me, return our in-flight promise
        var origFetch = window.fetch;
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : ((input && input.url) || '');
          if (prefetchPromise && url && (url.endsWith('/api/auth/me') || url.includes('/api/auth/me'))) {
            var p = prefetchPromise;
            prefetchPromise = null; // use only once
            return p.then(function(res) {
              if (!res) return origFetch.call(window, input, init);
              return new Response(JSON.stringify(res.data), {
                status: res.status,
                headers: { 'Content-Type': 'application/json' }
              });
            });
          }
          return origFetch.apply(window, arguments);
        };
      } catch(e){}
    })();
  </script>

<script id="admin-operator-btn">
// Inject "Operators" link into admin sidebar/nav
(function() {
  function injectOperatorLink() {
    // Look for admin nav elements
    const selectors = [
      'a[href="/admin/players"]',
      'a[href*="players"]',
      '[class*="sidebar"] a',
      'nav a',
      '[class*="nav"] a'
    ];
    for (const sel of selectors) {
      const links = document.querySelectorAll(sel);
      for (const link of links) {
        if (link.href && link.href.includes('/admin') && !document.getElementById('op-nav-link')) {
          const li = link.closest('li') || link.parentElement;
          const newEl = li.cloneNode(true);
          const newLink = newEl.querySelector('a') || newEl;
          if (newLink.tagName === 'A') {
            newLink.href = '/admin/operators';
            newLink.id = 'op-nav-link';
            newLink.removeAttribute('data-discover');
          }
          // Update text content
          const textNodes = newEl.querySelectorAll('span, p, div');
          let changed = false;
          for (const t of textNodes) {
            if (t.children.length === 0 && t.textContent.trim()) {
              t.textContent = 'Operators';
              changed = true; break;
            }
          }
          if (!changed) newEl.textContent = 'Operators';
          li.parentElement.appendChild(newEl);

          // Add notification badge if there are pending operators
          fetch('/api/operator/admin/list', {
            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || '') }
          }).then(r => r.json()).then(ops => {
            const pending = Array.isArray(ops) ? ops.filter(o => o.status === 'pending_approval').length : 0;
            const unread = Array.isArray(ops) ? ops.reduce((s,o) => s + parseInt(o.unread||0), 0) : 0;
            const total = pending + unread;
            if (total > 0) {
              const badge = document.createElement('span');
              badge.textContent = total;
              badge.style.cssText = 'background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;margin-left:6px;';
              newEl.appendChild(badge);
            }
          }).catch(() => {});
          return true;
        }
      }
    }
    return false;
  }

  // Try immediately and then watch for React render
  let attempts = 0;
  const interval = setInterval(() => {
    if (injectOperatorLink() || ++attempts > 40) clearInterval(interval);
  }, 500);
})();
</script>
