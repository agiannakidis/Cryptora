    <script>
    // Cryptora error guard — filter console noise from injection scripts
    (function(){
      var origError = console.error.bind(console);
      var origWarn = console.warn.bind(console);
      var NOISE = [
        'ResizeObserver loop',
        'Non-passive event listener',
        'Could not load',
        'Unrecognized feature',
        'Extension context',
        'blocked by CORS',
      ];
      function isNoise(args) {
        var s = Array.prototype.join.call(args,' ');
        for(var i=0;i<NOISE.length;i++){ if(s.indexOf(NOISE[i])!==-1) return true; }
        return false;
      }
      console.error = function(){ if(!isNoise(arguments)) origError.apply(console,arguments); };
      console.warn  = function(){ if(!isNoise(arguments)) origWarn.apply(console,arguments); };
    })();
    </script>

    <!-- ── /api/auth/me prefetch (early, before React hydrates) ── -->
    <script>
    (function(){
      try {
        var t = localStorage.getItem('auth_token');
        if (!t) return;
        var prefetchPromise = fetch('/api/auth/me', {
          headers: { Authorization: 'Bearer ' + t }
        }).then(function(r){ return r.clone().json().then(function(d){ return {data:d, status:r.status}; }); })
          .catch(function(){ return null; });
        var origFetch = window.fetch;
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : ((input && input.url) || '');
          if (prefetchPromise && url && (url.endsWith('/api/auth/me') || url.includes('/api/auth/me'))) {
            var p = prefetchPromise;
            prefetchPromise = null;
            return p.then(function(res) {
              if (!res) return origFetch.call(window, input, init);
              return new Response(JSON.stringify(res.data), {
                status: res.status,
                headers: { 'Content-Type': 'application/json' }
              });
            });
          }
          return origFetch.apply(window, arguments);
        };
      } catch(e){}
    })();
    </script>
