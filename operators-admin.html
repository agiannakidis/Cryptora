<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptora — Operators</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080c18; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

/* Header */
.header { background: #0d1224; border-bottom: 1px solid #1e2440; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 700; color: #f59e0b; display: flex; align-items: center; gap: 8px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.badge { font-size: 12px; color: #64748b; }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* Login */
#loginSection { max-width: 400px; margin: 80px auto; background: #141829; border: 1px solid #252b45; border-radius: 16px; padding: 32px; }
#loginSection h2 { font-size: 18px; font-weight: 700; color: #f59e0b; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 5px; letter-spacing: .04em; }
input, select, textarea { width: 100%; background: #0d1224; border: 1px solid #252b45; border-radius: 8px; color: #e2e8f0; font-size: 14px; padding: 9px 13px; outline: none; transition: border-color .2s; }
input:focus, select:focus, textarea:focus { border-color: #f59e0b; }

/* Buttons */
.btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .2s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { opacity: .88; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0a0e1a; }
.btn-full { width: 100%; justify-content: center; padding: 11px; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-green { background: #16a34a; color: #fff; }
.btn-red { background: #dc2626; color: #fff; }
.btn-blue { background: #2563eb; color: #fff; }
.btn-ghost { background: transparent; border: 1px solid #252b45; color: #94a3b8; }
.btn-ghost:hover { border-color: #64748b; color: #e2e8f0; }

/* Status */
.status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
.status.ok  { background: #052e16; color: #4ade80; border: 1px solid #166534; }
.status.err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }

/* Top bar */
.topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.topbar h2 { font-size: 16px; font-weight: 700; color: #fff; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: #141829; border: 1px solid #1e2440; border-radius: 12px; padding: 16px; }
.stat-card .val { font-size: 22px; font-weight: 800; color: #f59e0b; }
.stat-card .lbl { font-size: 12px; color: #64748b; margin-top: 2px; }

/* Operator list */
.op-card { background: #141829; border: 1px solid #1e2440; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.op-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; }
.op-header:hover { background: rgba(255,255,255,.02); }
.op-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0; }
.op-info { flex: 1; min-width: 0; }
.op-name { font-weight: 700; color: #fff; font-size: 14px; }
.op-email { font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.op-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.badge-status { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
.badge-status.approved { background: #052e16; color: #4ade80; border: 1px solid #166534; }
.badge-status.pending_approval { background: #451a03; color: #fb923c; border: 1px solid #92400e; }
.badge-status.pending_email { background: #1e1b4b; color: #818cf8; border: 1px solid #3730a3; }
.badge-status.rejected { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
.balance-tag { font-size: 13px; font-weight: 700; color: #4ade80; }
.chevron { color: #64748b; font-size: 12px; transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }

.op-body { border-top: 1px solid #1e2440; padding: 16px 18px; display: none; }
.op-body.open { display: block; }

.op-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

/* Credit form */
.credit-row { display: flex; gap: 8px; align-items: flex-end; }
.credit-row input { width: 120px; flex-shrink: 0; }

/* Tab system */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #252b45; color: #64748b; background: transparent; transition: all .15s; }
.tab.active { background: #f59e0b18; border-color: #f59e0b40; color: #f59e0b; }

/* Players table */
.mini-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.mini-table th { text-align: left; padding: 6px 10px; color: #475569; font-size: 11px; font-weight: 700; letter-spacing: .05em; border-bottom: 1px solid #1e2440; }
.mini-table td { padding: 8px 10px; border-bottom: 1px solid #0d1224; color: #cbd5e1; vertical-align: middle; }
.mini-table tr:last-child td { border-bottom: none; }
.mini-table tr:hover td { background: rgba(255,255,255,.02); }

/* Messages */
.msg-list { max-height: 200px; overflow-y: auto; padding: 8px; background: #0d1224; border-radius: 8px; margin-bottom: 8px; }
.msg { padding: 6px 10px; margin-bottom: 6px; border-radius: 8px; font-size: 12px; }
.msg.admin { background: #1e2440; color: #94a3b8; }
.msg.operator { background: #f59e0b18; color: #fbbf24; }
.msg.system { background: #052e16; color: #4ade80; font-style: italic; }
.msg-meta { font-size: 10px; color: #475569; margin-top: 2px; }

/* Add operator modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #141829; border: 1px solid #252b45; border-radius: 16px; padding: 28px 32px; width: 100%; max-width: 480px; position: relative; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 18px; font-weight: 700; color: #f59e0b; margin-bottom: 20px; }
.modal .close-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; line-height: 1; }
.modal .close-btn:hover { color: #e2e8f0; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .grid2 { grid-template-columns: 1fr; }
  .op-meta { flex-direction: column; align-items: flex-end; gap: 4px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🏢 Operator Management</h1>
  <div class="header-right">
    <span class="badge" id="adminEmail"></span>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
    <a href="/" class="btn btn-ghost btn-sm">← Site</a>
  </div>
</div>

<!-- LOGIN -->
<div id="loginSection">
  <h2>🔐 Admin Login</h2>
  <div class="field"><label>EMAIL</label><input type="email" id="loginEmail" placeholder="gaminator2013@gmail.com"></div>
  <div class="field"><label>PASSWORD</label><input type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <button class="btn btn-primary btn-full" onclick="doLogin()">Login</button>
  <div class="status" id="loginStatus"></div>
</div>

<!-- MAIN -->
<div id="mainSection" style="display:none">
  <div class="container">
    <!-- Stats -->
    <div class="stats" id="statsRow"></div>

    <!-- Topbar -->
    <div class="topbar">
      <h2>All Operators</h2>
      <button class="btn btn-primary" onclick="showAddModal()">＋ Add Operator</button>
    </div>

    <!-- Operator list -->
    <div id="opList"><div style="color:#64748b;text-align:center;padding:40px">Loading…</div></div>
  </div>
</div>

<!-- ADD OPERATOR MODAL -->
<div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <button class="close-btn" onclick="document.getElementById('addModal').style.display='none'">✕</button>
    <h2>➕ Add Operator</h2>
    <div class="grid2">
      <div class="field"><label>USERNAME</label><input type="text" id="newUsername" placeholder="operator_name" autocomplete="off"></div>
      <div class="field"><label>CURRENCY</label>
        <select id="newCurrency">
          <option value="USD">USD</option><option value="EUR">EUR</option>
          <option value="USDT">USDT</option><option value="BTC">BTC</option>
        </select>
      </div>
    </div>
    <div class="field"><label>EMAIL</label><input type="email" id="newEmail" placeholder="operator@example.com" autocomplete="off"></div>
    <div class="field"><label>PASSWORD</label><input type="password" id="newPassword" placeholder="min 6 characters" autocomplete="new-password"></div>
    <div class="grid2">
      <div class="field"><label>INITIAL BALANCE ($)</label><input type="number" id="newBalance" min="0" step="0.01" placeholder="0.00"></div>
      <div class="field"><label>NOTES (optional)</label><input type="text" id="newNotes" placeholder="VIP partner…"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-ghost" onclick="document.getElementById('addModal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" id="addSubmitBtn" onclick="submitAdd()">Create Operator</button>
    </div>
    <div class="status" id="addStatus"></div>
  </div>
</div>

<script>
let token = localStorage.getItem('cr_admin_token') || '';
let operators = [];

// ── Auth ──────────────────────────────────────────────────────────────────────
function showStatus(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'status ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
  if (ok) setTimeout(() => el.style.display = 'none', 3500);
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (!email || !pw) return showStatus('loginStatus', 'Fill in all fields', false);
  try {
    const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password:pw}) });
    const d = await r.json();
    if (!r.ok || !d.token) return showStatus('loginStatus', d.error || 'Login failed', false);
    if (d.user?.role !== 'admin') return showStatus('loginStatus', 'Admin access required', false);
    token = d.token;
    localStorage.setItem('cr_admin_token', token);
    document.getElementById('adminEmail').textContent = d.user.email || d.user.name || 'Admin';
    showMain();
  } catch { showStatus('loginStatus', 'Network error', false); }
}

function doLogout() {
  token = ''; localStorage.removeItem('cr_admin_token');
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('mainSection').style.display = 'none';
}

function showMain() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('mainSection').style.display = 'block';
  loadOperators();
}

// ── Load operators ────────────────────────────────────────────────────────────
async function loadOperators() {
  try {
    const r = await fetch('/api/operator/admin/list', { headers:{'Authorization':'Bearer '+token} });
    if (r.status === 401 || r.status === 403) { doLogout(); return; }
    operators = await r.json();
    renderStats();
    renderList();
  } catch { document.getElementById('opList').innerHTML = '<div style="color:#f87171;text-align:center;padding:40px">Failed to load</div>'; }
}

function renderStats() {
  const total    = operators.length;
  const approved = operators.filter(o => o.status === 'approved').length;
  const pending  = operators.filter(o => o.status === 'pending_approval').length;
  const totalBal = operators.reduce((s, o) => s + parseFloat(o.balance||0), 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total Operators</div></div>
    <div class="stat-card"><div class="val" style="color:#4ade80">${approved}</div><div class="lbl">Approved</div></div>
    <div class="stat-card"><div class="val" style="color:#fb923c">${pending}</div><div class="lbl">Pending</div></div>
    <div class="stat-card"><div class="val">$${totalBal.toFixed(0)}</div><div class="lbl">Total Balance</div></div>
  `;
}

function renderList() {
  const el = document.getElementById('opList');
  if (!operators.length) { el.innerHTML = '<div style="color:#64748b;text-align:center;padding:40px">No operators yet. Add one!</div>'; return; }
  el.innerHTML = operators.map(op => `
    <div class="op-card" id="opcard-${op.id}">
      <div class="op-header" onclick="toggleOp('${op.id}')">
        <div class="op-avatar">${(op.username||'?')[0].toUpperCase()}</div>
        <div class="op-info">
          <div class="op-name">${esc(op.username)}</div>
          <div class="op-email">${esc(op.email)}</div>
        </div>
        <div class="op-meta">
          <span class="badge-status ${op.status}">${op.status.replace('_',' ')}</span>
          <span class="balance-tag">$${parseFloat(op.balance||0).toFixed(2)}</span>
          ${op.unread > 0 ? `<span style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px">${op.unread}</span>` : ''}
          <span class="chevron" id="chev-${op.id}">▼</span>
        </div>
      </div>
      <div class="op-body" id="opbody-${op.id}">
        <div class="op-actions">
          ${op.status === 'pending_approval' ? `<button class="btn btn-green btn-sm" onclick="approveOp('${op.id}')">✓ Approve</button>` : ''}
          ${op.status === 'pending_approval' ? `<button class="btn btn-red btn-sm" onclick="rejectOp('${op.id}')">✗ Reject</button>` : ''}
          <button class="btn btn-blue btn-sm" onclick="openCreditModal('${op.id}')">💰 Credit</button>
          <button class="btn btn-ghost btn-sm" onclick="loadTab('${op.id}','players')">👥 Players</button>
          <button class="btn btn-ghost btn-sm" onclick="loadTab('${op.id}','chat')">💬 Chat</button>
        </div>

        <div class="tabs">
          <div class="tab active" id="tab-${op.id}-info" onclick="showTab('${op.id}','info')">Info</div>
          <div class="tab" id="tab-${op.id}-players" onclick="loadTab('${op.id}','players')">Players</div>
          <div class="tab" id="tab-${op.id}-chat" onclick="loadTab('${op.id}','chat')">Chat</div>
        </div>

        <div id="tabcontent-${op.id}">
          <table class="mini-table">
            <tr><th>Field</th><th>Value</th></tr>
            <tr><td>ID</td><td style="font-family:monospace;font-size:11px;color:#94a3b8">${op.id}</td></tr>
            <tr><td>Currency</td><td>${op.currency}</td></tr>
            <tr><td>Balance</td><td style="color:#4ade80;font-weight:700">$${parseFloat(op.balance||0).toFixed(2)}</td></tr>
            <tr><td>Created</td><td>${fmtDate(op.created_at)}</td></tr>
            ${op.approved_at ? `<tr><td>Approved</td><td>${fmtDate(op.approved_at)}</td></tr>` : ''}
            ${op.notes ? `<tr><td>Notes</td><td>${esc(op.notes)}</td></tr>` : ''}
          </table>
        </div>
        <div class="status" id="opstatus-${op.id}"></div>
      </div>
    </div>
  `).join('');
}

// ── Toggle expand ─────────────────────────────────────────────────────────────
function toggleOp(id) {
  const body = document.getElementById('opbody-'+id);
  const chev = document.getElementById('chev-'+id);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function showTab(opId, tab) {
  ['info','players','chat'].forEach(t => {
    document.getElementById('tab-'+opId+'-'+t)?.classList.toggle('active', t === tab);
  });
}

// ── Load players tab ──────────────────────────────────────────────────────────
async function loadTab(opId, tab) {
  showTab(opId, tab);
  const cont = document.getElementById('tabcontent-'+opId);

  if (tab === 'players') {
    cont.innerHTML = '<div style="color:#64748b;padding:16px">Loading…</div>';
    try {
      const r = await fetch(`/api/operator/admin/${opId}/players`, { headers:{'Authorization':'Bearer '+token} });
      const players = await r.json();
      if (!players.length) { cont.innerHTML = '<div style="color:#64748b;padding:16px">No players yet</div>'; return; }
      cont.innerHTML = `<table class="mini-table">
        <thead><tr><th>Username</th><th>Balance</th><th>In Game</th><th>Last Seen</th></tr></thead>
        <tbody>${players.map(p => `
          <tr>
            <td>${esc(p.username)}</td>
            <td style="color:#4ade80;font-weight:700">$${parseFloat(p.balance||0).toFixed(2)}</td>
            <td>${p.in_game ? '<span style="color:#f59e0b">🎮 Yes</span>' : '<span style="color:#475569">—</span>'}</td>
            <td style="color:#475569">${p.last_seen ? fmtDate(p.last_seen) : '—'}</td>
          </tr>`).join('')}
        </tbody></table>`;
    } catch { cont.innerHTML = '<div style="color:#f87171;padding:16px">Error loading players</div>'; }

  } else if (tab === 'chat') {
    cont.innerHTML = '<div style="color:#64748b;padding:16px">Loading…</div>';
    try {
      const r = await fetch(`/api/operator/admin/${opId}/chat`, { headers:{'Authorization':'Bearer '+token} });
      const msgs = await r.json();
      cont.innerHTML = `
        <div class="msg-list">${msgs.length ? msgs.map(m => `
          <div class="msg ${m.sender}">
            <div>${esc(m.message)}</div>
            <div class="msg-meta">${m.sender} · ${fmtDate(m.created_at)}</div>
          </div>`).join('') : '<div style="color:#475569;text-align:center;padding:16px">No messages</div>'}
        </div>
        <div style="display:flex;gap:8px">
          <input type="text" id="chatinput-${opId}" placeholder="Message to operator…" style="flex:1" onkeydown="if(event.key==='Enter')sendChat('${opId}')">
          <button class="btn btn-primary btn-sm" onclick="sendChat('${opId}')">Send</button>
        </div>`;
    } catch { cont.innerHTML = '<div style="color:#f87171;padding:16px">Error loading chat</div>'; }

  } else {
    // info — already rendered
  }
}

async function sendChat(opId) {
  const inp = document.getElementById('chatinput-'+opId);
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  try {
    await fetch(`/api/operator/admin/${opId}/chat`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({message:msg}) });
    loadTab(opId, 'chat');
  } catch {}
}

// ── Approve / Reject ──────────────────────────────────────────────────────────
async function approveOp(id) {
  if (!confirm('Approve this operator?')) return;
  const r = await fetch(`/api/operator/admin/${id}/approve`, { method:'POST', headers:{'Authorization':'Bearer '+token} });
  const d = await r.json();
  if (d.ok) { showStatus('opstatus-'+id, '✅ Approved!', true); loadOperators(); }
  else showStatus('opstatus-'+id, d.error || 'Error', false);
}

async function rejectOp(id) {
  const reason = prompt('Rejection reason (optional):');
  if (reason === null) return;
  const r = await fetch(`/api/operator/admin/${id}/reject`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({reason}) });
  const d = await r.json();
  if (d.ok) { showStatus('opstatus-'+id, '❌ Rejected', true); loadOperators(); }
  else showStatus('opstatus-'+id, d.error || 'Error', false);
}

// ── Credit modal ──────────────────────────────────────────────────────────────
function openCreditModal(id) {
  const amt = prompt('Credit amount ($):');
  if (!amt || isNaN(parseFloat(amt))) return;
  const note = prompt('Note (optional):') || '';
  creditOp(id, parseFloat(amt), note);
}

async function creditOp(id, amount, note) {
  const r = await fetch(`/api/operator/admin/${id}/credit`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({amount,note}) });
  const d = await r.json();
  if (d.ok) { showStatus('opstatus-'+id, `✅ Credited $${amount}. New balance: $${d.newBalance?.toFixed(2)}`, true); loadOperators(); }
  else showStatus('opstatus-'+id, d.error || 'Error', false);
}

// ── Add operator ──────────────────────────────────────────────────────────────
function showAddModal() {
  document.getElementById('addModal').style.display = 'flex';
  document.getElementById('newUsername').focus();
}

async function submitAdd() {
  const username = document.getElementById('newUsername').value.trim();
  const email    = document.getElementById('newEmail').value.trim();
  const password = document.getElementById('newPassword').value;
  const currency = document.getElementById('newCurrency').value;
  const initialBalance = parseFloat(document.getElementById('newBalance').value) || 0;
  const notes    = document.getElementById('newNotes').value.trim();

  if (!username || !email || !password || !currency)
    return showStatus('addStatus', 'Fill in username, email, password and currency', false);

  const btn = document.getElementById('addSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating…';

  try {
    const r = await fetch('/api/operator/admin/create', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
      body: JSON.stringify({ username, email, password, currency, initialBalance, notes })
    });
    const d = await r.json();
    if (!r.ok) {
      showStatus('addStatus', '❌ ' + (d.error || 'Failed'), false);
      btn.disabled = false; btn.textContent = 'Create Operator';
      return;
    }
    showStatus('addStatus', `✅ Operator "${d.operator.username}" created!`, true);
    btn.textContent = '✓ Done';
    // Reset form
    ['newUsername','newEmail','newPassword','newBalance','newNotes'].forEach(id => document.getElementById(id).value = '');
    setTimeout(() => {
      document.getElementById('addModal').style.display = 'none';
      btn.disabled = false; btn.textContent = 'Create Operator';
      loadOperators();
    }, 1500);
  } catch {
    showStatus('addStatus', 'Network error', false);
    btn.disabled = false; btn.textContent = 'Create Operator';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '—';
  try {
    const dt = new Date(d);
    return dt.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'2-digit'}) + ' ' +
           dt.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  } catch { return d; }
}

// ── Init ──────────────────────────────────────────────────────────────────────
if (token) {
  // Verify token still valid
  fetch('/api/auth/me', { headers:{'Authorization':'Bearer '+token} })
    .then(r => r.json())
    .then(d => {
      if (d?.role === 'admin') {
        document.getElementById('adminEmail').textContent = d.email || d.name || 'Admin';
        showMain();
      } else { doLogout(); }
    })
    .catch(doLogout);
}
</script>
</body>
